<svg width="1200" height="220" viewBox="0 0 1200 220" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0d1117">
        <animate attributeName="stop-color" values="#0d1117;#0e2a47;#0d1117" dur="6s" repeatCount="indefinite"/>
      </stop>
      <stop offset="50%" stop-color="#0e75b6">
        <animate attributeName="stop-color" values="#0e75b6;#1e3c72;#0e75b6" dur="6s" repeatCount="indefinite"/>
      </stop>
      <stop offset="100%" stop-color="#0d1117">
        <animate attributeName="stop-color" values="#0d1117;#0e2a47;#0d1117" dur="6s" repeatCount="indefinite"/>
      </stop>
    </linearGradient>

    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur result="blur">
        <animate attributeName="stdDeviation" values="2;5;2" dur="3s" repeatCount="indefinite"/>
      </feGaussianBlur>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <linearGradient id="scanGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0"/>
      <stop offset="50%" stop-color="#7fd4ff" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>

    <radialGradient id="dotGrad" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#7fd4ff" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#7fd4ff" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="220" fill="url(#bgGrad)"/>

  <!-- Subtle grid lines -->
  <g stroke="#ffffff" stroke-opacity="0.05" stroke-width="1">
    <line x1="0" y1="55" x2="1200" y2="55"/>
    <line x1="0" y1="110" x2="1200" y2="110"/>
    <line x1="0" y1="165" x2="1200" y2="165"/>
  </g>

  <!-- Floating particles moving here and there -->
  <circle r="4" fill="url(#dotGrad)">
    <animateMotion path="M60,180 Q300,40 600,120 T1140,60" dur="9s" repeatCount="indefinite"/>
  </circle>
  <circle r="3" fill="url(#dotGrad)">
    <animateMotion path="M1150,30 Q900,190 600,90 T50,150" dur="11s" repeatCount="indefinite"/>
  </circle>
  <circle r="5" fill="url(#dotGrad)">
    <animateMotion path="M200,20 Q500,200 800,40 T1100,180" dur="13s" repeatCount="indefinite"/>
  </circle>
  <circle r="2.5" fill="url(#dotGrad)">
    <animateMotion path="M1000,200 Q700,20 400,160 T100,60" dur="8s" repeatCount="indefinite"/>
  </circle>
  <circle r="3.5" fill="url(#dotGrad)">
    <animateMotion path="M500,10 Q800,150 300,190 T900,50" dur="10s" repeatCount="indefinite"/>
  </circle>

  <!-- Moving scan-line sheen -->
  <rect x="-400" y="0" width="400" height="220" fill="url(#scanGrad)">
    <animateTransform attributeName="transform" type="translate" values="-400 0; 1600 0" dur="5s" repeatCount="indefinite"/>
  </rect>

  <!-- Orbiting ring accent -->
  <circle cx="150" cy="110" r="70" fill="none" stroke="#7fd4ff" stroke-opacity="0.15" stroke-width="1.5" stroke-dasharray="4 6">
    <animateTransform attributeName="transform" type="rotate" from="0 150 110" to="360 150 110" dur="20s" repeatCount="indefinite"/>
  </circle>
  <circle cx="1050" cy="110" r="70" fill="none" stroke="#7fd4ff" stroke-opacity="0.15" stroke-width="1.5" stroke-dasharray="4 6">
    <animateTransform attributeName="transform" type="rotate" from="360 1050 110" to="0 1050 110" dur="20s" repeatCount="indefinite"/>
  </circle>

  <!-- Main name, glowing pulse -->
  <text x="600" y="105" text-anchor="middle" font-family="Segoe UI, Verdana, sans-serif" font-size="54" font-weight="700" fill="#ffffff" filter="url(#glow)">
    Muhammad Adeel
    <animate attributeName="opacity" values="0.85;1;0.85" dur="3s" repeatCount="indefinite"/>
  </text>

  <!-- Subtitle -->
  <text x="600" y="145" text-anchor="middle" font-family="Segoe UI, Verdana, sans-serif" font-size="19" fill="#9fd8ff" letter-spacing="0.5">
    Software Engineer &#160;|&#160; Full-Stack &amp; Mobile Developer &#160;|&#160; AI Enthusiast
  </text>

  <!-- Animated underline accent -->
  <line x1="450" y1="165" x2="750" y2="165" stroke="#7fd4ff" stroke-width="2" stroke-linecap="round">
    <animate attributeName="x1" values="450;480;450" dur="4s" repeatCount="indefinite"/>
    <animate attributeName="x2" values="750;720;750" dur="4s" repeatCount="indefinite"/>
    <animate attributeName="stroke-opacity" values="0.3;1;0.3" dur="4s" repeatCount="indefinite"/>
  </line>
</svg>
